name: Build for Tiny Core Linux
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          # Якщо є requirements.txt, розкоментуй:
          # pip install -r requirements.txt

      - name: Build executable
        run: |
          # Створюємо один файл, який включає всі залежності
          pyinstaller --onefile BS_OS.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BS_OS_Linux
          path: dist/BS_OS
